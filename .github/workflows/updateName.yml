name: Update Derech Olam Name

on:
  workflow_dispatch:

jobs:
  update-name:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repository WITHOUT using GITHUB_TOKEN
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          persist-credentials: false  # prevents automatic GITHUB_TOKEN override

      # 2️⃣ Setup Node.js environment
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '24'

      # 3️⃣ Install dependencies
      - name: Install dependencies
        run: npm install

      # 4️⃣ Configure Git to use Classic PAT
      - name: Configure Git to use Classic PAT
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${{ secrets.DOMG6027_UPDATE_TEMP }}@github.com/${{ github.repository }}.git"

      # 5️⃣ Optional log to confirm remote URL (token will be masked automatically)
      - name: Log remote URL for verification
        run: git remote -v

      # 6️⃣ Run the update script
      - name: Run update script
        run: node updateName.js

      # 7️⃣ Commit and push changes
      - name: Commit and push changes
        run: |
          git add .
          git commit -m "Update Derech Olam name to Mishkan International" || echo "No changes to commit"
          git push origin HEAD:main
