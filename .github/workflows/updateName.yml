name: Update Derech Olam Name

on:
  workflow_dispatch:

jobs:
  update-name:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0  # Ensure full history for git push

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Configure Git to use Classic PAT
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.DOMG6027_UPDATE_TEMP }}@github.com/${{ github.repository }}.git

      - name: Run update script
        run: node updateName.js

      - name: Commit and push changes
        run: |
          git add .
          git commit -m "Update Derech Olam name to Mishkan International" || echo "No changes to commit"
          git push origin HEAD:main
